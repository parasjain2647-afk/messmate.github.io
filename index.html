<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MessMate</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1117;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  text-align: center;
}

/* Title */
h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

p {
  color: #aaa;
}

/* Cards layout */
.cards {
  display: flex;
  gap: 20px;
  margin-top: 40px;
}

/* Card design */
.card {
  width: 240px;
  padding: 25px;
  background: #1c1f26;
  border-radius: 15px;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid transparent;
}

/* Hover effect */
.card:hover {
  transform: translateY(-8px) scale(1.03);
  border: 1px solid #00ff88;
  box-shadow: 0 10px 25px rgba(0,255,136,0.2);
}

/* Icon circle */
.icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #2a2d36;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  font-size: 24px;
}

/* Card text */
.card h3 {
  margin: 10px 0;
}

.card p {
  font-size: 14px;
  color: #bbb;
}
</style>

</head>

<body>

<div class="container">

  <h1>Welcome to MessMate</h1>
  <p>Please select your role to continue</p>

  <div class="cards">

    <div class="card" onclick="goTo('student')">
      <div class="icon">👤</div>
      <h3>Student Panel</h3>
      <p>View menu, rate meals, and vote</p>
    </div>

    <div class="card" onclick="goTo('warden')">
      <div class="icon">🛡️</div>
      <h3>Warden Panel</h3>
      <p>Manage menu and hygiene</p>
    </div>
    
  </div>

</div>

<script>
function goTo(role) {
  if(role === 'student'){
    window.location.href = "dashboard.html";
  }
  else if(role === 'warden'){
    window.location.href = "warden-dashboard.html";
  }
  
}
</script>

</body>
</html>
