<!DOCTYPE html>
<html>

<head>
<title>MessMate - Rewards</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
background:#0b0f0c;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0a0d0b;
height:100vh;
padding:20px;
position:fixed;
left:0;
top:0;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:bold;
margin-bottom:30px;
}

.logo-icon{
width:35px;
height:35px;
background:#22c55e;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:black;
}

.sidebar a{
display:block;
padding:12px;
color:#aaa;
text-decoration:none;
margin-bottom:6px;
border-radius:6px;
}

.sidebar a i{
margin-right:10px;
width:18px;
}

.sidebar a:hover{
background:#13301f;
color:#4ade80;
}

.active{
background:#13301f;
color:#4ade80;
}

.profile{
position:absolute;
bottom:20px;
left:20px;
right:20px;

display:flex;
align-items:center;
gap:12px;

padding:12px;
background:#111;
border-radius:10px;
border:1px solid #222;
}

/* green square avatar */

.profile-avatar{
width:36px;
height:36px;
background:#22c55e;
border-radius:8px;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
color:#053d1f;
}

/* name section */

.profile-name{
font-weight:600;
}

.profile-role{
font-size:13px;
color:#9ca3af;
}

/* MAIN */

.main{
margin-left:230px;
padding:40px;
overflow-y:auto;
height:100vh;
width:100%;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

/* POINTS CARD */

.points-card{
background:#111;
border:1px solid #222;
padding:25px;
border-radius:10px;
margin-bottom:40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.points-card h2{
margin:0;
font-size:36px;
}

/* OFFERS GRID */

.offers-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* OFFER CARD */

.offer{
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #222;
}

.offer h3{
margin-top:0;
}

.offer p{
color:#aaa;
}

.redeem{
margin-top:10px;
padding:8px 12px;
background:#13301f;
color:#4ade80;
border:none;
border-radius:6px;
cursor:pointer;
}

.redeem:hover{
background:#1b3f2c;
}

.reward-img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<div class="logo-icon">M</div>
MessMate
</div>

<a href="dashboard.html">
<i class="fa-solid fa-house"></i> Dashboard
</a>

<a href="menu.html">
<i class="fa-solid fa-utensils"></i> Menu
</a>

<a href="rate.html">
<i class="fa-solid fa-star"></i> Rate Meal
</a>

<a href="ai-voting.html">
<i class="fa-solid fa-robot"></i> AI Voting
</a>

<a class="active" href="rewards.html">
<i class="fa-solid fa-gift"></i> Rewards
</a>

<a href="inspection.html">
<i class="fa-solid fa-clipboard-check"></i> Inspection
</a>

<a href="musclepass.html">
<i class="fa-solid fa-dumbbell"></i> MusclePass
</a>

<a href="about.html">
<i class="fa-solid fa-circle-info"></i> About
</a>

<div class="profile">

<div class="profile-avatar">
JD
</div>

<div class="profile-info">
<div class="profile-name">John Doe</div>
<div class="profile-role">Student</div>
</div>

</div>
</div>


<!-- MAIN CONTENT -->

<div class="main">

<h1>Rewards</h1>
<p class="subtitle">Redeem your participation points.</p>


<!-- POINTS -->

<div class="points-card">
<div>
<p>Available Points</p>
<h2 id="points"></h2>
</div>

<i class="fa-solid fa-gift fa-2x"></i>
</div>


<!-- OFFERS -->

<h2>Available Offers</h2>

<div class="offers-grid" id="offersGrid"></div>

</div>


<script>

/* LOAD JSON */

fetch("data.json")
.then(res=>res.json())
.then(data=>{

/* SHOW USER POINTS */

document.getElementById("points").innerText =
data.user.points


/* LOAD OFFERS */

let grid=document.getElementById("offersGrid")

data.offers.forEach(offer=>{

let card=document.createElement("div")
card.className="offer"

card.innerHTML = `
<img src="${offer.image}" class="reward-img">

<h3>${offer.brand}</h3>
<p>${offer.offer}</p>

<p><b>${offer.pointsRequired} points</b></p>

<button class="redeem">Redeem</button>
`;

grid.appendChild(card)

})

})

</script>

</body>
</html>
