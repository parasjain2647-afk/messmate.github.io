<!DOCTYPE html>
<html>

<head>
<title>MessMate - AI Voting</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
background:#0b0f0c;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0a0d0b;
height:100vh;
padding:20px;
position:fixed;
left:0;
top:0;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:bold;
margin-bottom:30px;
}

.logo-icon{
width:35px;
height:35px;
background:#22c55e;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:black;
}

.sidebar a{
display:block;
padding:12px;
color:#aaa;
text-decoration:none;
margin-bottom:6px;
border-radius:6px;
}

.sidebar a i{
margin-right:10px;
width:18px;
}

.sidebar a:hover{
background:#13301f;
color:#4ade80;
}

.active{
background:#13301f;
color:#4ade80;
}

.profile{
position:absolute;
bottom:20px;
left:20px;
right:20px;

display:flex;
align-items:center;
gap:12px;

padding:12px;
background:#111;
border-radius:10px;
border:1px solid #222;
}

/* green square avatar */

.profile-avatar{
width:36px;
height:36px;
background:#22c55e;
border-radius:8px;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
color:#053d1f;
}

/* name section */

.profile-name{
font-weight:600;
}

.profile-role{
font-size:13px;
color:#9ca3af;
}

/* MAIN */

.main{
margin-left:230px;
padding:40px;
overflow-y:auto;
height:100vh;
width:100%;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

/* FLAGGED DISH */

.flagged{
background:#1a0b0b;
border:1px solid #7f1d1d;
padding:25px;
border-radius:10px;
margin-bottom:40px;
}

.flagged-img{
width:120px;
border-radius:10px;
margin-top:10px;
margin-bottom:10px;
}

.dish-img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

/* VOTING GRID */

.vote-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* OPTION CARD */

.option{
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #222;
text-align:center;
}

.vote-btn{
margin-top:10px;
padding:10px 15px;
border:none;
background:#13301f;
color:#4ade80;
border-radius:6px;
cursor:pointer;
}

.vote-btn:hover{
background:#1b3f2c;
}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<div class="logo-icon">M</div>
MessMate
</div>

<a href="dashboard.html">
<i class="fa-solid fa-house"></i> Dashboard
</a>

<a href="menu.html">
<i class="fa-solid fa-utensils"></i> Menu
</a>

<a href="rate.html">
<i class="fa-solid fa-star"></i> Rate Meal
</a>

<a class="active" href="ai-voting.html">
<i class="fa-solid fa-robot"></i> AI Voting
</a>

<a href="rewards.html">
<i class="fa-solid fa-gift"></i> Rewards
</a>

<a href="inspection.html">
<i class="fa-solid fa-clipboard-check"></i> Inspection
</a>

<a href="musclepass.html">
<i class="fa-solid fa-dumbbell"></i> MusclePass
</a>

<a href="about.html">
<i class="fa-solid fa-circle-info"></i> About
</a>

<div class="profile">

<div class="profile-avatar">
JD
</div>

<div class="profile-info">
<div class="profile-name">John Doe</div>
<div class="profile-role">Student</div>
</div>

</div>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<h1>AI Dish Replacement</h1>
<p class="subtitle">Vote on AI-suggested alternatives for poorly rated dishes.</p>


<!-- FLAGGED DISH -->

<div id="flaggedDish">
<p>This dish has received low ratings from students.</p>
<h2>⚠ Flagged Dish: <span id="flaggedDish"></span></h2>

</div>


<!-- VOTING OPTIONS -->

<h2>AI Suggested Alternatives</h2>

<div class="vote-grid" id="voteGrid"></div>

</div>


<script>

/* LOAD DATA */

fetch("data.json")
.then(res=>res.json())
.then(data=>{

/* SHOW FLAGGED DISH */

let flagged = data.voting.flaggedDish;

document.getElementById("flaggedDish").innerHTML = `
<h2>⚠ Flagged Dish: ${flagged.name}</h2>

<img src="${flagged.image}" class="flagged-img">
<h3>This dish has received low ratings from students.</h3>

`;

/* LOAD ALTERNATIVES */

let grid=document.getElementById("voteGrid")

data.voting.alternatives.forEach((item,index)=>{

let card=document.createElement("div")
card.className="option"

card.innerHTML=`
<img src="${item.image}" class="dish-img">
<h3>${item.name}</h3>
<p>Votes: <span id="votes${index}">${item.votes}</span></p>
<button class="vote-btn" onclick="vote(${index})">
Vote
</button>
`

grid.appendChild(card)

})

})


/* VOTE FUNCTION */

function vote(index){

let votes=parseInt(document.getElementById("votes"+index).innerText)

votes++

document.getElementById("votes"+index).innerText=votes

}

</script>

</body>
</html>
